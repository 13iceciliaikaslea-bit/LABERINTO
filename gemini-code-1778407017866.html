<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowNova B - Private Search</title>
    <style>
        :root {
            --dark-bg: #0b0d0f;
            --neon-blue: #0084ff;
            --neon-orange: #ff4d00;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white; overflow: hidden;
        }

        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transition: 0.5s opacity;
        }

        .container {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        .logo-img {
            width: 140px; height: 140px;
            border-radius: 30px; margin-bottom: 15px;
            box-shadow: 0 0 40px rgba(255, 77, 0, 0.4);
            object-fit: cover;
        }

        .brand-name {
            font-size: clamp(40px, 8vw, 70px);
            font-weight: 900; margin-bottom: 45px;
            letter-spacing: -2px;
            background: linear-gradient(to right, #ffffff, #ff4d00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Barra de búsqueda */
        .search-box {
            width: 90%; max-width: 680px;
            padding: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-orange));
            border-radius: 100px;
            display: flex; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .search-box input {
            width: 100%; padding: 20px 35px;
            border: none; border-radius: 100px;
            background: #15171b; color: white;
            font-size: 20px; outline: none;
        }

        .btn-group { margin-top: 35px; display: flex; gap: 20px; }

        .btn {
            padding: 14px 28px; border-radius: 50px;
            cursor: pointer; font-weight: bold; font-size: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        .btn-main { background: var(--neon-orange); color: white; box-shadow: 0 5px 15px rgba(255, 77, 0, 0.3); }
        .btn-luck { border: 2px solid var(--neon-blue); color: var(--neon-blue); background: transparent; }

        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .upload-label {
            position: absolute; bottom: 30px;
            color: #555; font-size: 11px; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; transition: 0.3s;
        }
        .upload-label:hover { color: #aaa; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="container">
        <img src="https://i.ibb.co/3mS0S9q/ninja-cat.png" class="logo-img" alt="Logo">
        
        <div class="brand-name">ShadowNova B</div>

        <div class="search-box">
            <input type="text" id="query" placeholder="Buscar de forma privada..." autocomplete="off" spellcheck="false" autofocus>
        </div>

        <div class="btn-group">
            <button class="btn btn-main" onclick="startSearch()">Buscar en la red</button>
            <button class="btn btn-luck" onclick="window.location.href='https://www.google.com/doodles'">Suerte</button>
        </div>

        <label class="upload-label">
            Subir Fondo Personalizado
            <input type="file" id="bg-input" hidden accept="image/*">
        </label>
    </div>

    <script>
        const input = document.getElementById('query');
        const bgLayer = document.getElementById('bg-layer');
        const fileInput = document.getElementById('bg-input');

        // FUNCIÓN DE BÚSQUEDA PRIVADA
        function startSearch() {
            const text = input.value.trim();
            if (text !== "") {
                const url = `https://www.google.com/search?q=${encodeURIComponent(text)}`;
                // replace() evita que esta página se guarde antes de entrar a Google
                window.location.replace(url);
            }
        }

        // ESCUCHAR TECLA ENTER
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                startSearch();
            }
        });

        // GESTIÓN DE FONDO
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataUrl = event.target.result;
                    bgLayer.style.backgroundImage = `url(${dataUrl})`;
                    localStorage.setItem('nova_bg_v2', dataUrl);
                };
                reader.readAsDataURL(file);
            }
        });

        // CARGAR FONDO AL INICIO
        window.onload = () => {
            const saved = localStorage.getItem('nova_bg_v2');
            if (saved) bgLayer.style.backgroundImage = `url(${saved})`;
        };
    </script>
</body>
</html>
